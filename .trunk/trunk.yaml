version: 0.1
cli:
  version: 1.25.0
api:
  address: api.trunk.io:443
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - python@3.10.8
    - go@1.21.0
    - node@22.16.0
    - rust@1.85.0
tools:
  enabled:
    - gh@2.65.0
  runtimes:
    - rust
lint:
  definitions:
    - name: trunk-toolbox
      tools: [trunk-toolbox]
      files: [ALL]
      commands:
        - name: lint
          run: ${workspace}/toolbox-latest --upstream=${upstream-ref} --cache-dir=${cachedir} --results=${tmpfile} ${target}
          output: sarif
          batch: true
          success_codes: [0]
          read_output_from: tmp_file
          cache_results: true
          disable_upstream: false
          max_concurrency: 1
          direct_configs: [toolbox.toml]
      version_command:
        parse_regex: ${semver}
        run: trunk-toolbox --version
      affects_cache: [toolbox.toml, log4rs.yaml]
      environment:
        - name: PATH
          list: ["${linter}", "${env.PATH}"]
        - name: debug_path
          value: "${workspace}/target/debug/trunk-toolbox"
        - name: release_path
          value: "${workspace}/target/release/trunk-toolbox"
  ignore:
    - linters: [trunk-toolbox]
      paths:
        - tests/**

  enabled:
    - osv-scanner@2.2.4
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - trunk-toolbox@0.5.4
    - checkov@3.2.521
    - trufflehog@3.90.13
    - oxipng@9.1.5
    - yamllint@1.38.0
    - git-diff-check
    - taplo@0.10.0
    - actionlint@1.7.8
    - clippy@1.85.0
    - gitleaks@8.29.0
    - markdownlint@0.48.0
    - prettier@3.8.3
    - rustfmt@1.85.0
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
