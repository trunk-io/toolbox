name: Main

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 07:00 UTC to surface flaky tests that don't always fail on
    # push. Keeping the same job so uploads go through the same code path as
    # the post-merge runs.
    - cron: "0 7 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_test:
    name: Cargo Test [linux]
    runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run tests
        run: cargo nextest run --profile=ci

      - name: Upload test results
        # Establish the main-branch baseline that Trunk Flaky Tests compares
        # PR runs against. Runs even if tests fail so flakes/failures are visible.
        if: "!cancelled()"
        uses: trunk-io/analytics-uploader@main
        with:
          junit-paths: ${{ github.workspace }}/target/nextest/ci/*junit.xml
          org-slug: trunk
          token: ${{ secrets.TRUNK_PROD_ORG_API_TOKEN }}
        continue-on-error: true
